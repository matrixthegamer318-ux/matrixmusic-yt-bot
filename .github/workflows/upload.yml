name: Daily YouTube Upload Bot

on:
  schedule:
    # 🌅 Morning automation run
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'

    # 🌇 Afternoon automation run
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run automation bot
      - name: Run YouTube automation bot
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          PENDING_FOLDER_ID: ${{ secrets.PENDING_FOLDER_ID }}
          UPLOADED_FOLDER_ID: ${{ secrets.UPLOADED_FOLDER_ID }}
        run: |
          echo "🚀 Starting automation..."
          python main.py

      # 5️⃣ Commit updated titles.txt
      - name: Commit updated titles.txt
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add titles.txt

          git commit -m "chore: mark title as used" || echo "No changes to commit"

          git push
